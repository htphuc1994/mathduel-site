<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#fff0f6" />
<title>Math Duel 🍓 vs 🫐</title>
<style>
  :root{color-scheme:light}
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;display:grid;place-items:center;padding:2rem;text-align:center;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#5b3a64;
    background:
      radial-gradient(120% 85% at 12% -10%, #ffe3f1 0%, transparent 55%),
      radial-gradient(120% 85% at 90% 110%, #d8f4ff 0%, transparent 55%),
      radial-gradient(90% 70% at 80% 0%, #fff3cf 0%, transparent 50%),
      linear-gradient(160deg,#fff5fb 0%,#fff9f0 45%,#eafcff 100%);}
  .card{max-width:32rem}
  .emoji{font-size:clamp(3rem,12vw,4.5rem);line-height:1}
  h1{font-size:clamp(2.2rem,9vw,3.2rem);line-height:1;margin:.4rem 0 0;font-weight:800}
  h1 .m{color:#ff5d8f} h1 .d{color:#2f97f0}
  p{font-size:clamp(1rem,3.5vw,1.2rem);color:#9a7fa6;margin:1rem auto 0;max-width:28rem;line-height:1.5}
  .badge{display:inline-block;margin-top:1.6rem;padding:.6em 1.4em;border-radius:999px;font-weight:700;
    color:#fff;background:linear-gradient(160deg,#ffd23f,#ff8a3d);box-shadow:0 6px 0 #e07e12}
  footer{margin-top:1.8rem;font-size:.95rem}
  a{color:#2f97f0;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🍓 ✕ 🫐</div>
    <h1><span class="m">MATH</span> <span class="d">DUEL!</span></h1>
    <p>A two-player math duel for one tablet — multiply, add, subtract, divide, or type your own
       function f(x). 11 languages. Plays fully offline. No ads, no in-app purchases, no data collected.</p>
    <div class="badge">Coming soon to the App Store</div>
    <footer><a href="privacy.html">Privacy Policy</a></footer>
  </div>
</body>
</html>
